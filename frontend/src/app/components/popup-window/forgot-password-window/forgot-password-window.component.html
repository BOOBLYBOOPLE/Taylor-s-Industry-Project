<h2 mat-dialog-title>Reset Password</h2>

<div mat-dialog-content class="d-flex flex-column gap-3" style="min-width: 350px;">
  <p class="text-secondary small">Enter your username or email to verify your identity, then set a new password.</p>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Username or Email</mat-label>
    <input matInput [(ngModel)]="data.identifier" placeholder="admin or admin@test.com">
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label>New Password</mat-label>
    <input matInput [type]="hide ? 'password' : 'text'" [(ngModel)]="data.newPassword">
    <button mat-icon-button matSuffix (click)="hide = !hide"
            [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Confirm New Password</mat-label>
    <input matInput [type]="hide1 ? 'password' : 'text'"  [(ngModel)]="data.confirmPassword">
        <button mat-icon-button matSuffix (click)="hide1 = !hide1"
            [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
            <mat-icon>{{hide1 ? 'visibility_off' : 'visibility'}}</mat-icon>
       </button>
  </mat-form-field>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()"
          [disabled]="isLoading || !data.identifier || !data.newPassword">
    {{ isLoading ? 'Processing...' : 'Reset Password' }}
  </button>
</div>
