<body class="body-padding">
  <div class="container">
  <div class="d-flex justify-content-between mb-3">
    <h1 class="mt-4">Leave Details</h1>
  </div>

  <mat-card class="p-4" appearance="outlined">
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="fw-bold text-muted">Employee</label>
        <p class="fs-5">{{ leaveData.employeeId?.name || 'Unknown' }}</p>
      </div>
      <div class="col-md-6">
        <label class="fw-bold text-muted">Status</label>
        <p class="fs-5">{{ leaveData.status }}</p>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-4">
        <label class="fw-bold text-muted">Start Date</label>
        <p>{{ leaveData.dateStart | date:'mediumDate' }}</p>
      </div>
      <div class="col-md-4">
        <label class="fw-bold text-muted">End Date</label>
        <p>{{ leaveData.dateEnd | date:'mediumDate' }}</p>
      </div>
      <div class="col-md-4">
        <label class="fw-bold text-muted">Paid Leave?</label>
        <p>{{ leaveData.paid ? 'Yes' : 'No' }}</p>
      </div>
    </div>

    <div class="mb-3">
      <label class="fw-bold text-muted">Type</label>
      <p>{{ leaveData.type }}</p>
    </div>

    <mat-divider class="mb-3"></mat-divider>

    <div class="mb-3 ms-4 me-4">
      <label class="fw-bold text-muted mb-2">Description</label>
      <div class="border rounded p-3 bg-light" [innerHTML]="leaveData.content"></div>
    </div>
    <button class="button-content" (click)="goBack()">Back</button>
  </mat-card>
</div>

<ng-template #loading>
  <div class="text-center mt-5">Loading...</div>
</ng-template>
</body>
