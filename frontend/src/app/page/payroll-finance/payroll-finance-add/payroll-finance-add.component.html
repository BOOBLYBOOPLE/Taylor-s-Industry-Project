<body class="body-padding">
  <div class="me-2 ms-2">
    <button class="md-button" (click)="goBack()">go back</button>
    <mat-card class="card card-body card-center" appearance="outlined">
      <h1 class="mt-4 ms-4 me-4 mb-3">New Graph</h1>
      <form [formGroup]="graphForm">
        <div class="d-flex flex-row">
          <div class="col-6 me-4">
            <div class="d-flex flex-row align-items-center">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Title</mat-label>
                <input matInput formControlName="title" class="form-control" required>
              </mat-form-field>
            </div>

            <div class="row">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Graph Type</mat-label>
                <mat-select formControlName="graphType" >
                  <mat-option *ngFor="let type of graphTypes" [value]="type" class="md-button">{{type}}</mat-option>
                </mat-select>
              </mat-form-field>
            </div>

            <div class="row">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Prefix</mat-label>
                <mat-select formControlName="axisYPrefix">
                  <mat-option *ngFor="let type of prefixTypes" [value]="type" class="md-button">{{type}}</mat-option>
                </mat-select>
              </mat-form-field>
            </div>
          </div>

          <div class="col-6">
            <div class="row">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Field Name</mat-label>
                <input matInput class="form-control" formControlName="name">
              </mat-form-field>
            </div>

            <div class="row">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>X-axis Value conditional</mat-label>
                <mat-select [(ngModel)]="xAxisType" [ngModelOptions]="{standalone: true}">
                  <mat-option *ngFor="let type of xAxisTypeValues" [value]="type" class="md-button">{{type}}</mat-option>
                </mat-select>
              </mat-form-field>
            </div>

            <div class="row">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Font Size</mat-label>
                <input matInput formControlName="fontSize" class="form-control" required>
              </mat-form-field>
            </div>
          </div>
        </div>
      </form>
    </mat-card>
    <div class="mt-2">
      <mat-card>
        <div class="d-flex flex-row justify-content-sm-center">
          <div class="col-2">
            <div class="row">
              <div class="ms-2 w-50">
                <label>X-axis</label>
                <input [type]="xAxisType === 'date' ? 'date' : xAxisType === 'number' ? 'number' : 'text'"
                  [(ngModel)]="currentX" class="form-control" required>
              </div>
            </div>

            <div class="row">
              <div class="ms-2 w-50">
                <label>Y-axis</label>
                <input type="text" [(ngModel)]="currentY" class="form-control" required>
              </div>
            </div>

            <div class="row">
              <button type="button" (click)="addDataPoint()" class="btn btn-primary ms-lg-3 ms-1 mt-3 w-50">
                Add Point
              </button>
            </div>

            <div class="row">
              <button (click)="submitGraph()" class="btn btn-success mt-1 ms-lg-3 w-50">Save Graph</button>
            </div>
          </div>

          <div class="col-2">
            <div class="mt-2 scroll-view" style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
              <ul class="list-unstyled">
                <li *ngFor="let p of graphDataPoints; let i = index" class="d-flex justify-content-between align-items-center mb-2">
                  <span><strong>{{ p.label || p.x }}:</strong> {{ p.y }}</span>
                  <button class="btn btn-sm btn-outline-danger" (click)="removeDataPoint(i)" style="padding: 0 5px;">&times;</button>
                </li>
              </ul>
              <p *ngIf="graphDataPoints.length === 0" class="text-muted small">No points added yet.</p>
            </div>

            <div class="row">
              <button type="button" (click)="updatePreview()" class="btn btn-primary ms-lg-3 ms-1 mt-1 w-50">
                Refresh
              </button>
            </div>

          </div>

          <div class="col-8">
            <mat-card>
              <canvasjs-chart [options]="chartOptions" [styles]="{width: '100%', height: '300px'}"></canvasjs-chart>
            </mat-card>
          </div>
        </div>
      </mat-card>
    </div>
  </div>
</body>
