<body class="body-padding">
  <mat-card class="card ps-2 pe-2">
    <mat-card appearance="outlined" class="ms-2 me-2">
      <div *ngIf="chatName" class="mb-3 mt-3 ms-4 me-4">
        <label class="fw-bold text-muted mb-2">{{chatName}}</label>
        <div class="border rounded p-3 bg-light" style="height: 460px; overflow-y: auto;">
          <div *ngFor="let msg of messages" class="mb-2">
            <div *ngIf="msg.username === chatName" class="received_msg">
              <div (mouseenter)="goIn(msg)" (mouseleave)="goOut(msg)" class="received_withd_msg">
                <div class="d-flex flex-row align-items-center">
                  <strong style="font-size: 0.8em;">{{ msg.username }}</strong>
                  <div *ngIf="msg.hover">
                    <button mat-icon-button (click)="prepareEdit(msg)"><mat-icon>edit</mat-icon></button>
                    <button mat-icon-button (click)="deleteMessage(msg)"><mat-icon>delete</mat-icon></button>
                  </div>
                </div>
                <p>{{ msg.message }}</p>
              </div>
            </div>
            <div *ngIf="msg.username === currentUser.username" class="sent_msg">
              <div class="sent_withd_msg">
                <div (mouseenter)="goIn(msg)" (mouseleave)="goOut(msg)">
                  <div class="d-flex flex-row align-items-center justify-content-end">
                    <div *ngIf="msg.hover">
                      <button mat-icon-button (click)="deleteMessage(msg)"><mat-icon>delete</mat-icon></button>
                      <button mat-icon-button (click)="prepareEdit(msg)"><mat-icon>edit</mat-icon></button>
                    </div>
                    <strong class="text-end" style="font-size: 0.8em;">{{ msg.username }}</strong>
                  </div>
                  <p>{{ msg.message }}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div *ngIf="!chatName" class="mb-3 mt-3 ms-4 me-4">
        <div class="border rounded p-3 bg-light text-center">
          Begin Chatting
        </div>
      </div>
    </mat-card>
    <div class="d-flex flex-row mt-2 ms-2">
      <button *ngIf="!isEditing" class="btn btn-secondary" style="height: 40px; margin-top: 8px;"><i class="fa fa-plus"></i></button>
      <button *ngIf="isEditing" class="btn btn-danger" style="height: 40px; margin-top: 8px;" (click)="cancelEdit()">
        <i class="fa fa-times"></i>
      </button>

      <mat-form-field appearance="outline" *ngIf="!isEditing" class="w-100 mt-2 ms-2 small-field">
        <input matInput type="text" [(ngModel)]="message" (keyup.enter)="sendMessage()">
      </mat-form-field>

      <mat-form-field appearance="outline" *ngIf="isEditing" class="w-100 mt-2 ms-2 small-field" style="background-color: green">
        <input matInput type="text" [(ngModel)]="message" (keyup.enter)="submitEdit()">
      </mat-form-field>

      <button class="btn btn-primary ms-2 me-2" style="height: 40px; margin-top: 8px;"
              (click)="isEditing ? submitEdit() : sendMessage()">
        <i class="fa" [ngClass]="isEditing ? 'fa-check' : 'fa-paper-plane'"></i>
      </button>
    </div>
  </mat-card>
</body>
