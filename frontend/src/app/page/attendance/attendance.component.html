<body class="body-padding">
  <div class="canvasJS-style align-items-center">
    <canvasjs-chart [options]="chartOptions"></canvasjs-chart>
  </div>

  <div class="ms-2 me-2">
    <mat-grid-list cols="4" rowHeight="4:1">
      <mat-grid-tile class="card-container">
        <mat-card class="card card-body card-center">
          Attendance: {{present }} attending
        </mat-card>
      </mat-grid-tile>
      <mat-grid-tile class="card-container">
        <mat-card class="card card-body card-center">
        Absent: {{absent }} on leave
        </mat-card>
      </mat-grid-tile>
      <mat-grid-tile class="card-container">
        <mat-card class="card card-body card-center">
          Upcoming Event: CNY Holiday
        </mat-card>
      </mat-grid-tile>
      <mat-grid-tile class="card-container">
        <mat-card class="card card-body card-center">
          Next Meeting: Friday 10am
        </mat-card>
      </mat-grid-tile>
    </mat-grid-list>
  </div>

 <div class="ms-2 me-2 ">
  <mat-card class="card card-body">
  <h2 class="ms-3 mb-0">Attendance</h2>
  <div class="ms-3 me-3">
    <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="position">
          <th mat-header-cell class="tbl-header" *matHeaderCellDef> No. </th>
          <td mat-cell class="tbl-content" *matCellDef="let element; let i = index"> {{i + 1}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef> Department </th>
          <td mat-cell *matCellDef="let element"> {{element.department}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let element"> {{element.status}}
            <mat-icon *ngIf="element.status === 'Present'"
              style="font-size: 16px; color: green; vertical-align: middle;"
              matTooltip="Approved">
              check_circle
            </mat-icon>

            <mat-icon *ngIf="element.status === 'Awaiting'"
                      style="font-size: 16px; color: orange; vertical-align: middle;"
                      matTooltip="Pending Approval">
              hourglass_empty
            </mat-icon>

            <mat-icon *ngIf="element.status === 'Absent'"
                      style="font-size: 16px; color: red; vertical-align: middle;"
                      matTooltip="Rejected">
                      cancel
            </mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button class="button-content" [matMenuTriggerFor]="menu">actions</button>
              <mat-menu #menu="matMenu">
                <button class="md-button" (click)="updateStatus(element, 'Present')" mat-menu-item><span>Present</span></button>
                <mat-divider></mat-divider>
                <button class="md-button" (click)="updateStatus(element, 'Absent')" mat-menu-item><span>Absent</span></button>
              </mat-menu>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
  </div>
</mat-card>
</div>
</body>
