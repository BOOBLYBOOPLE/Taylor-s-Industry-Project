<body class="body-padding">
  <div class="d-flex align-items-center mb-3 ms-2">
    <mat-form-field appearance="outline" class="mt-2 ms-2" style="width: 300px;">
      <mat-label>Search Employees</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. John Doe">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

      <button class="ms-2 button-3" routerLink="add-employee" ><i class="fa fa-add"></i></button>
    <!-- <button class="ms-2">
      <mat-icon>filter_list</mat-icon> Filter
    </button> -->
  </div>

  <div class="ms-2 me-2">
    <mat-card class="card mat-elevation-z8">
      <h1 class="ms-2">Employee List</h1>
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="position">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="tbl-header"> No. </th>
          <td mat-cell class="tbl-content" *matCellDef="let element; let i = index"> {{i + 1}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
          <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Department </th>
          <td mat-cell *matCellDef="let element"> {{element.department}} </td>
        </ng-container>

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
          <td mat-cell *matCellDef="let element"> {{element.title}} </td>
        </ng-container>

        <ng-container matColumnDef="salary">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Salary </th>
          <td mat-cell *matCellDef="let element"> {{element.salary}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button class="button-content" [matMenuTriggerFor]="menu">
              Actions <mat-icon>arrow_drop_down</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item [routerLink]="['/employee/view-employee', element._id]">
                <mat-icon>visibility</mat-icon>
                <span>View</span>
              </button>
              <button *ngIf="isAdmin" mat-menu-item [routerLink]="['/employee/add-employee', element._id]">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <mat-divider></mat-divider>
              <button *ngIf="isAdmin" mat-menu-item routerLink="/complaints/add-complaints">
                <mat-icon>report_problem</mat-icon>
                <span>Report</span>
              </button>
              <button *ngIf="isAdmin" style="color: red" mat-menu-item (click)="onDelete(element)">
                <mat-icon color="warn">delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5" style="text-align: center; padding: 20px;">
            No data matching the filter
          </td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons aria-label="Select page of employees">
      </mat-paginator>

    </mat-card>
  </div>
</body>
