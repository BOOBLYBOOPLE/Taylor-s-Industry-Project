<mat-sidenav-container>
  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button routerLink="/">
        <mat-icon>logout</mat-icon>
      </button>
      <span class="spacer"></span>
      <button mat-icon-button>
        <mat-icon>report</mat-icon>
      </button>
      <button mat-icon-button>
        <mat-icon>info</mat-icon>
      </button>
    </mat-toolbar>

    <mat-card class="card card-center">
      <img class="md-fab-login mt-3" src="../../../assets/pics/default_profile.png">
      <form [formGroup]="registerForm" class="card-center" (ngSubmit)="register()">
        <div>
          <mat-form-field class="mt-3" appearance="fill">
            <mat-label>name</mat-label>
            <input formControlName="username" matInput>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field class="mt-3" appearance="fill">
          <mat-label>dob</mat-label>
          <input matInput [matDatepicker]="picker">
            <mat-hint>MM-DD-YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field class="mt-3" appearance="fill">
            <mat-label>email</mat-label>
            <input formControlName="email" matInput>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field class="mt-3" appearance="fill">
            <mat-label>Role</mat-label>
            <mat-select formControlName="role">
              <mat-option value="user">User</mat-option>
              <mat-option value="admin">Admin</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div>
          <mat-form-field class="mt-3" appearance="fill">
            <mat-label>password</mat-label>
            <input formControlName="password" matInput>
          </mat-form-field>
        </div>
        <div>
          <button class="button-content" (keyup.enter)="register()" type="submit"> Register </button>
          <button class="ms-4 button-content" routerLink="/"> Cancel </button>
        </div>
      </form>
    </mat-card>
  </mat-sidenav-content>
</mat-sidenav-container>
