<body class="body-padding">
    <div class="d-inline-flex ms-2 mt-2">
      <div class="spacer-margin-left">
        <mat-form-field appearance="outline">
          <mat-label>Search</mat-label>
          <input (keyup)="applyFilter($event)" matInput>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button class="ms-2 button-3" routerLink="add-complaints" ><i class="fa fa-add"></i></button>
        <!-- <button class="ms-2 button-3"><i class="fa fa-filter"></i></button> -->
      </div>
      <!-- <div class="spacer-margin-right">
        <mat-form-field appearance="outline">
          <mat-label>Chose a date</mat-label>
          <input matInput [matDatepicker]="picker">
          <mat-hint>MM-DD-YYYY</mat-hint>
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div> -->
    </div>

    <div class="ms-2 me-2">
      <mat-card class="card">
          <h2 class="ms-3 mt-2 mb-0">Complaints List</h2>
          <div class="ms-3 me-3">
            <table mat-table [dataSource]="dataSource" class="mt-2">
              <ng-container matColumnDef="position">
                <th mat-header-cell *matHeaderCellDef mat-sort-header class="tbl-header"> No. </th>
                <td mat-cell class="tbl-content" *matCellDef="let element; let i = index"> {{i + 1}} </td>
              </ng-container>

              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let element"> {{element.employeeId?.name}} </td>
              </ng-container>

              <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef> Type </th>
                <td mat-cell *matCellDef="let element"> {{element.type}} </td>
              </ng-container>

              <ng-container matColumnDef="summary">
                <th mat-header-cell *matHeaderCellDef> Summary </th>
                <td mat-cell *matCellDef="let element">
                  {{element.summary}}
                <mat-icon *ngIf="element.resolved" style="font-size: 16px; color: green; vertical-align: middle;" matTooltip="Resolved">check_circle</mat-icon>
                <mat-icon *ngIf="!element.resolved"
                        style="font-size: 16px; color: orange; vertical-align: middle;"
                        matTooltip="Pending Approval">
                hourglass_empty
              </mat-icon>
                </td>
              </ng-container>

              <ng-container matColumnDef="date">
                <th mat-header-cell *matHeaderCellDef> Date </th>
                <td mat-cell *matCellDef="let element"> {{element.date | date: 'mediumDate'}} </td>
              </ng-container>

              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                  <button class="button-content" [matMenuTriggerFor]="menu">
                    <span>actions</span><mat-icon>arrow_drop_down</mat-icon></button>
                    <mat-menu #menu="matMenu">
                      <button class="md-button" [routerLink]="['/complaints/view-complaints', element._id]" mat-menu-item>
                        <mat-icon>visibility</mat-icon><span>view</span></button>
                      <mat-divider></mat-divider>
                      <button *ngIf="!element.resolved" class="md-button" (click)="markAsResolved(element)" mat-menu-item>
                        <mat-icon style="color: green;">check</mat-icon><span>Resolved</span>
                      </button>
                      <mat-divider></mat-divider>
                      <button class="md-button" (click)="onDelete(element)" mat-menu-item>
                        <mat-icon color="warn">delete</mat-icon><span>Delete</span></button>
                    </mat-menu>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons aria-label="Select page of recruitment">
            </mat-paginator>
          </div>

        </mat-card>
    </div>
</body>
