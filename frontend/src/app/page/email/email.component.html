<body class="body-padding">
  <div class="ms-2 mt-2">
      <h1>Inbox</h1>
  </div>
  <div>
  <mat-form-field class=""  appearance="outline">
    <mat-label>
      Search
    </mat-label>
  <input matInput>
  </mat-form-field>
    <button routerLink="compose" class="button-content" style="margin-bottom: 12px; margin-left: 12px; margin-right: 12px;">
      <i class="fa fa-plus-circle"></i>Compose
    </button>
    <button class="ms-2 button-3"><i class="fa fa-filter"></i></button>
    <button class="ms-2 button-3"><i class="fa fa-refresh"></i></button>
</div>

  <mat-card class="table-card">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 table-margin">
    <ng-container matColumnDef="position">
      <th mat-header-cell class="tbl-header" *matHeaderCellDef> No. </th>
      <td mat-cell class="tbl-content" *matCellDef="let element"> {{element.position}} </td>
    </ng-container>

    <ng-container matColumnDef="from">
      <th mat-header-cell *matHeaderCellDef> From </th>
      <td mat-cell *matCellDef="let element"> {{element.from}} </td>
    </ng-container>

    <ng-container matColumnDef="to">
      <th mat-header-cell *matHeaderCellDef> To </th>
      <td mat-cell *matCellDef="let element"> {{element.to}} </td>
    </ng-container>

    <ng-container matColumnDef="subject">
      <th mat-header-cell *matHeaderCellDef> Subject </th>
      <td mat-cell *matCellDef="let element"> {{element.subject}} </td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Date </th>
      <td mat-cell *matCellDef="let element"> {{element.date}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let element">
        <button class="button-content" [matMenuTriggerFor]="menu">actions</button>
          <mat-menu #menu="matMenu">
            <button class="md-button" routerLink="view" mat-menu-item>
              <mat-icon color="accent">visibility</mat-icon>
              <span>View</span>
            </button>
            <button class="md-button" mat-menu-item routerLink="compose">
              <mat-icon>reply</mat-icon>
              <span>Reply</span>
            </button>
            <mat-divider></mat-divider>
            <button class="md-button" mat-menu-item>
              <mat-icon color="primary">star</mat-icon>
              <span>Mark As Important</span>
            </button>
            <mat-divider></mat-divider>
            <button class="md-button" mat-menu-item>
              <mat-icon>warning</mat-icon>
              <span>Mark As Spam</span>
            </button>
            <button class="md-button" mat-menu-item>
              <mat-icon color="warn">delete</mat-icon>
              <span>Send To Trash</span>
            </button>
          </mat-menu>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
</body>
